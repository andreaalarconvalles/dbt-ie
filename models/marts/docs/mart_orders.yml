version: 2

models:
  - name: mart_orders
    description: Fact table for orders, combining order details, item summaries, and shipping metrics.
    columns:
      - name: order_id
        description: Unique identifier for the order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to the customer dimension.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_date
        description: Date and time when the order was placed.
      - name: order_status
        description: Current status of the order.
      - name: total_amount
        description: Total amount of the order including tax and shipping.
      - name: total_unique_items
        description: Number of unique products in the order.
      - name: total_item_quantity
        description: Total quantity of items purchased.
      - name: days_to_ship
        description: Days taken to ship the order.
      - name: actual_days_in_transit
        description: Actual days the order spent in transit.
      - name: is_late_delivery
        description: Flag indicating if the delivery was late.
