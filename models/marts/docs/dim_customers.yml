version: 2

models:
  - name: dim_customers
    description: Dimension table for customers, ready for BI consumption.
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
      - name: first_name
        description: Customer's first name.
      - name: last_name
        description: Customer's last name.
      - name: full_name
        description: Concatenation of first and last name.
      - name: email
        description: Customer's email address.
      - name: email_domain
        description: Domain extracted from the email address.
      - name: age_group
        description: Age bracket (Under 18, 18-30, 31-50, 50+).
      - name: customer_segment
        description: Customer's segment.
      - name: is_priority_customer
        description: Boolean flag for Gold and Platinum customers.
      - name: street_address
        description: The street address of the customer's primary address.
      - name: postal_code
        description: The postal code of the customer's primary address.
      - name: address_city
        description: The city of the customer's primary address.
      - name: address_state
        description: The state of the customer's primary address.
      - name: address_country
        description: The country of the customer's primary address.
