version: 2

models:
  - name: dim_products
    description: Dimension table for products, enriched with category and supplier details.
    columns:
      - name: product_id
        description: Unique identifier for the product.
        tests:
          - unique
          - not_null
      - name: product_name
        description: Name of the product.
      - name: category_name
        description: Name of the product category.
      - name: supplier_name
        description: Name of the supplier.

  - name: mart_product_performance
    description: Aggregated product performance metrics.
    columns:
      - name: product_id
        description: Unique identifier for the product.
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: Total revenue generated by the product.
      - name: total_quantity_sold
        description: Total quantity of the product sold.

  - name: mart_revenue_by_segment
    description: Aggregated revenue metrics by customer segment.
    columns:
      - name: customer_segment
        description: Customer segment (Bronze, Silver, Gold, Platinum).
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: Total revenue generated by the segment.
      - name: average_order_value
        description: Average value of orders for the segment.
