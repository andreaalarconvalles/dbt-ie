version: 2

sources:
  - name: raw
    schema: main
    tables:
      - name: categories
        description: "Product categories with hierarchy (parent_category_id)"
      - name: customer_addresses
        description: "Shipping and billing addresses for customers"
      - name: customers
        description: "Customer data including demographics, geographic info, and segment"
      - name: inventory
        description: "Stock levels by warehouse for each product"
      - name: marketing_campaigns
        description: "Marketing campaign performance data"
      - name: order_items
        description: "Line items for each order with quantity and price"
      - name: orders
        description: "Order headers with status, totals, and payment info"
      - name: payments
        description: "Payment transactions linked to orders"
      - name: products
        description: "Product catalog with pricing, cost, and supplier info"
      - name: returns
        description: "Product returns data with reasons and refund amounts"
      - name: reviews
        description: "Product reviews by customers"
      - name: shipping
        description: "Shipping details for orders including carrier and tracking"
      - name: suppliers
        description: "Supplier information including contact details and ratings"
      - name: website_sessions
        description: "Web traffic data including device, source, and conversion"
