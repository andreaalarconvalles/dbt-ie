version: 2

models:
  - name: int_customers
    description: Intermediate model joining customers with segment details.
    columns:
      - name: customer_id
        description: Unique identifier for the customer.
      - name: customer_segment
        description: The segment of the customer (Bronze, Silver, Gold, Platinum).
      - name: segment_id
        description: Numeric identifier for the segment from the seed file.
      - name: street_address
        description: The street address of the customer's primary address.
      - name: postal_code
        description: The postal code of the customer's primary address.
      - name: address_city
        description: The city of the customer's primary address.
      - name: address_state
        description: The state of the customer's primary address.
      - name: address_country
        description: The country of the customer's primary address.
