version: 2

models:
  - name: int_order_items_summary
    description: Intermediate model aggregating order items to the order level.
    columns:
      - name: order_id
        description: Unique identifier for the order.
        tests:
          - unique
          - not_null
      - name: total_unique_items
        description: Count of distinct line items in the order.
      - name: total_quantity
        description: Sum of quantity of all items in the order.
      - name: total_item_value
        description: Sum of total price of all items in the order.

  - name: int_order_shipping
    description: Intermediate model calculating shipping metrics.
    columns:
      - name: order_id
        description: Unique identifier for the order.
        tests:
          - unique
          - not_null
      - name: days_to_ship
        description: Number of days between order placement and shipment.
      - name: estimated_days_in_transit
        description: Estimated days for delivery after shipment.
      - name: actual_days_in_transit
        description: Actual days taken for delivery after shipment.
      - name: is_late_delivery
        description: Boolean indicating if the order arrived after the estimated date.
