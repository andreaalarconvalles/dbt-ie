version: 2
models:
- name: stg_orders
  description: Staging model for orders
  columns:
  - name: order_id
    description: Unique identifier for the order
  - name: customer_id
    description: Foreign key to the customer table
  - name: order_date
    description: Date and time when the order was placed
  - name: status
    description: Order status (completed, pending, shipped, cancelled, refunded)
  - name: subtotal
    description: Order subtotal amount before tax and shipping
  - name: tax_amount
    description: Tax amount
  - name: shipping_cost
    description: Shipping cost
  - name: discount_amount
    description: Discount amount applied
  - name: total_amount
    description: Total order amount
  - name: currency
    description: Currency code (USD)
  - name: payment_method
    description: Payment method used
  - name: shipping_address_id
    description: Foreign key to the shipping address
  - name: billing_address_id
    description: Foreign key to the billing address
  - name: coupon_code
    description: Coupon code used (if any)
