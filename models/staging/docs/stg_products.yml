version: 2
models:
- name: stg_products
  description: Staging model for products
  columns:
  - name: product_id
    description: Unique identifier for the product
  - name: product_name
    description: Name of the product
  - name: category_id
    description: Foreign key to the category table
  - name: supplier_id
    description: Foreign key to the supplier table
  - name: price
    description: Selling price of the product
  - name: cost
    description: Cost of the product
  - name: weight_kg
    description: Weight of the product in kg
  - name: dimensions_cm
    description: Dimensions of the product in cm
  - name: description
    description: Product description
  - name: sku
    description: Stock Keeping Unit code
  - name: barcode
    description: Product barcode
  - name: status
    description: Product status (active, discontinued, out_of_stock)
  - name: created_date
    description: Date when the product was added
  - name: is_featured
    description: Whether the product is featured
