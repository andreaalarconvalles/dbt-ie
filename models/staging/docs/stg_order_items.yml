version: 2
models:
- name: stg_order_items
  description: Staging model for order_items
  columns:
  - name: order_item_id
    description: Unique identifier for the order item
  - name: order_id
    description: Foreign key to the order table
  - name: product_id
    description: Foreign key to the product table
  - name: quantity
    description: Quantity of the product ordered
  - name: unit_price
    description: Price per unit at the time of order
  - name: discount_amount
    description: Discount amount applied to this item
  - name: total_price
    description: Total price for this line item
