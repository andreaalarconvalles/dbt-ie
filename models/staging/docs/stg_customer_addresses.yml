version: 2
models:
- name: stg_customer_addresses
  description: Staging model for customer_addresses
  columns:
  - name: address_id
    description: Unique identifier for the address
  - name: customer_id
    description: Foreign key to the customer table
  - name: address_type
    description: Type of address (shipping, billing)
  - name: street_address
    description: Street address
  - name: city
    description: City
  - name: state
    description: State
  - name: postal_code
    description: Postal code
  - name: country
    description: Country
  - name: is_default
    description: Whether this is the default address for the customer
