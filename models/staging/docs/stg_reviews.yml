version: 2
models:
- name: stg_reviews
  description: Staging model for reviews
  columns:
  - name: review_id
    description: Unique identifier for the review
  - name: customer_id
    description: Foreign key to the customer table
  - name: product_id
    description: Foreign key to the product table
  - name: order_id
    description: Foreign key to the order table
  - name: rating
    description: Product rating (1-5)
  - name: review_title
    description: Title of the review
  - name: review_text
    description: Content of the review
  - name: review_date
    description: Date when the review was posted
  - name: is_verified_purchase
    description: Whether the purchase was verified
  - name: helpful_votes
    description: Number of helpful votes received
