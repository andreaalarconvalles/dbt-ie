version: 2
models:
- name: stg_inventory
  description: Staging model for inventory
  columns:
  - name: product_id
    description: Foreign key to the product table
  - name: warehouse
    description: Name of the warehouse
  - name: current_stock
    description: Current stock level
  - name: reorder_point
    description: Stock level at which to reorder
  - name: max_stock
    description: Maximum stock capacity
  - name: last_updated
    description: Date when the inventory was last updated
  - name: supplier_id
    description: Foreign key to the supplier table
