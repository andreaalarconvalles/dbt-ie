version: 2
models:
- name: stg_payments
  description: Staging model for payments
  columns:
  - name: payment_id
    description: Unique identifier for the payment
  - name: order_id
    description: Foreign key to the order table
  - name: customer_id
    description: Foreign key to the customer table
  - name: payment_date
    description: Date and time of the payment
  - name: payment_method
    description: Payment method used
  - name: amount
    description: Payment amount
  - name: currency
    description: Payment currency
  - name: status
    description: Payment status
  - name: transaction_id
    description: Transaction ID from the payment processor
  - name: card_last_four
    description: Last four digits of the card (if applicable)
  - name: payment_processor
    description: Payment processor used
