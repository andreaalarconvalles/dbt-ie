version: 2
models:
- name: stg_marketing_campaigns
  description: Staging model for marketing_campaigns
  columns:
  - name: campaign_id
    description: Unique identifier for the campaign
  - name: campaign_name
    description: Name of the marketing campaign
  - name: campaign_type
    description: Type of campaign (email, social_media, etc.)
  - name: channel
    description: Marketing channel (Facebook, Google, etc.)
  - name: start_date
    description: Start date of the campaign
  - name: end_date
    description: End date of the campaign
  - name: budget
    description: Budget allocated for the campaign
  - name: target_audience
    description: Target audience demographic
  - name: expected_impressions
    description: Expected number of impressions
  - name: actual_impressions
    description: Actual number of impressions
  - name: clicks
    description: Number of clicks generated
  - name: conversions
    description: Number of conversions generated
  - name: status
    description: Campaign status
