version: 2
models:
- name: stg_suppliers
  description: Staging model for suppliers
  columns:
  - name: supplier_id
    description: Unique identifier for the supplier
  - name: supplier_name
    description: Name of the supplier company
  - name: contact_email
    description: Contact email for the supplier
  - name: contact_phone
    description: Contact phone number for the supplier
  - name: country
    description: Country where the supplier is located
  - name: city
    description: City where the supplier is located
  - name: rating
    description: Supplier rating (1-5)
  - name: lead_time_days
    description: Average lead time in days
  - name: is_active
    description: Whether the supplier is currently active
  - name: contract_start_date
    description: Date when the contract started
