version: 2
models:
- name: stg_customers
  description: Staging model for customers
  columns:
  - name: customer_id
    description: Unique identifier for the customer
  - name: first_name
    description: Customer's first name
  - name: last_name
    description: Customer's last name
  - name: email
    description: Customer's email address
  - name: phone
    description: Customer's phone number
  - name: age
    description: Customer's age
  - name: gender
    description: Customer's gender
  - name: country
    description: Customer's country of residence
  - name: state
    description: Customer's state of residence (US only)
  - name: city
    description: Customer's city of residence
  - name: registration_date
    description: Date when the customer registered
  - name: customer_segment
    description: Customer segment (Bronze, Silver, Gold, Platinum)
  - name: total_orders
    description: Total number of orders placed by the customer
  - name: total_spent
    description: Total amount spent by the customer
  - name: is_active
    description: Whether the customer is currently active
