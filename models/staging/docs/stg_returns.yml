version: 2
models:
- name: stg_returns
  description: Staging model for returns
  columns:
  - name: return_id
    description: Unique identifier for the return
  - name: order_id
    description: Foreign key to the order table
  - name: order_item_id
    description: Foreign key to the order item table
  - name: product_id
    description: Foreign key to the product table
  - name: customer_id
    description: Foreign key to the customer table
  - name: return_date
    description: Date when the return was initiated
  - name: return_reason
    description: Reason for the return
  - name: return_quantity
    description: Quantity returned
  - name: refund_amount
    description: Amount refunded
  - name: return_status
    description: Status of the return
  - name: processing_fee
    description: Fee charged for processing the return
