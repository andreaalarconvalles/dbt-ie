version: 2
models:
- name: stg_website_sessions
  description: Staging model for website_sessions
  columns:
  - name: session_id
    description: Unique identifier for the session
  - name: customer_id
    description: Foreign key to the customer table (if logged in)
  - name: session_date
    description: Date and time of the session
  - name: device_type
    description: Device type used (desktop, mobile, tablet)
  - name: browser
    description: Browser used
  - name: source
    description: Traffic source
  - name: landing_page
    description: First page visited
  - name: page_views
    description: Number of pages viewed
  - name: session_duration_seconds
    description: Duration of the session in seconds
  - name: is_bounce
    description: Whether the session was a bounce
  - name: converted
    description: Whether the session resulted in a conversion
  - name: ip_address
    description: IP address of the user
